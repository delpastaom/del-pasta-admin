<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دل باستا | لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#D4913A;--brand-light:#E9A855;--brand-pale:#FDF5E6;
  --brand-dark:#9B6B2A;--bg:#FDFAF3;--surface:#FFFFFF;
  --surface2:#FDF5E6;--surface3:#F9F0E0;--text:#1A1200;
  --text2:#6B5020;--text3:#9B8040;--border:#E8D5A3;
  --green:#2D8B5F;--green-pale:#E8F8F0;
  --red:#C0392B;--red-pale:#FEE8E6;
  --yellow:#D4850A;--yellow-pale:#FEF5E0;
  --blue:#2471A3;--blue-pale:#EAF4FB;
  --radius:14px;--radius-sm:8px;
  --shadow:0 2px 16px rgba(212,145,58,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FDF0D5 0%,#F9E4B0 50%,#F5D688 100%);}
.login-box{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(212,145,58,.15);}
.login-logo{width:100px;height:100px;margin:0 auto 16px;}
.login-logo img{width:100%;object-fit:contain;}
.login-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:15px;color:var(--text);outline:none;text-align:center;letter-spacing:6px;margin-bottom:12px;}
.login-input:focus{border-color:var(--brand);}
.login-btn{width:100%;padding:13px;background:var(--brand);border:none;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;color:#fff;cursor:pointer;}
.login-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* LAYOUT */
.main{display:none;}
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.topbar-logo{display:flex;align-items:center;gap:10px;}
.topbar-logo img{width:44px;height:44px;object-fit:contain;}
.topbar-title{font-size:15px;font-weight:800;color:var(--brand);}
.topbar-sub{font-size:11px;color:var(--text3);}
.topbar-nav{display:flex;gap:4px;}
.nav-btn{padding:8px 16px;border-radius:20px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:all .2s;background:transparent;color:var(--text3);}
.nav-btn:hover{background:var(--brand-pale);color:var(--brand);}
.nav-btn.active{background:var(--brand);color:#fff;border-color:var(--brand);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.logout-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;background:transparent;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.content{padding:24px;max-width:1200px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stat-num{font-size:26px;font-weight:900;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px;}

/* TABLE */
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;}
.card-head{padding:14px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.card-head h3{font-size:14px;font-weight:800;color:var(--text);}
.filter-row{display:flex;gap:6px;}
.filter-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--text3);cursor:pointer;font-family:'Cairo',sans-serif;transition:all .2s;}
.filter-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;}
.refresh-btn{padding:6px 14px;background:var(--brand-pale);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--brand);cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-align:right;border-bottom:1.5px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:11px 14px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--brand-pale);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-new{background:var(--yellow-pale);color:var(--yellow);}
.badge-confirmed{background:var(--green-pale);color:var(--green);}
.badge-done{background:var(--blue-pale);color:var(--blue);}
.badge-cancelled{background:var(--red-pale);color:var(--red);}

/* ACTION BTNS */
.action-btns{display:flex;gap:4px;flex-wrap:wrap;}
.abtn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .15s;white-space:nowrap;}
.abtn-view{background:var(--surface2);color:var(--text2);}
.abtn-confirm{background:var(--green-pale);color:var(--green);}
.abtn-done{background:var(--blue-pale);color:var(--blue);}
.abtn-cancel{background:var(--red-pale);color:var(--red);}
.abtn-print{background:var(--brand-pale);color:var(--brand);}

/* CALENDAR */
.cal-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);background:var(--surface2);}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav button{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-nav button:hover{border-color:var(--brand);color:var(--brand);}
.cal-month{font-size:16px;font-weight:800;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day-name{padding:10px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);border-bottom:1.5px solid var(--border);background:var(--surface2);}
.cal-day{padding:6px;min-height:80px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.cal-day:hover{background:var(--brand-pale);}
.cal-day.other-month{opacity:.35;background:var(--bg);}
.cal-day.today .day-num{background:var(--brand);color:#fff;border-radius:50%;}
.day-num{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.day-event{font-size:9px;padding:2px 6px;border-radius:4px;margin-bottom:2px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-new{background:var(--yellow-pale);color:var(--yellow);}
.ev-confirmed{background:var(--green-pale);color:var(--green);}
.ev-done{background:var(--blue-pale);color:var(--blue);}
.ev-cancelled{background:var(--red-pale);color:var(--red);}
.cal-legend{padding:12px 20px;border-top:1.5px solid var(--border);display:flex;gap:16px;background:var(--surface2);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);font-weight:600;}
.legend-dot{width:10px;height:10px;border-radius:3px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border:1.5px solid var(--border);border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-head{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
.modal-head h3{font-size:16px;font-weight:800;color:var(--text);}
.modal-close{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.det-section{margin-bottom:18px;}
.det-section h4{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:10px;}
.det-key{font-size:12px;color:var(--text3);min-width:110px;}
.det-val{font-size:12px;color:var(--text);font-weight:600;text-align:left;flex:1;}
.items-box{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--text2);line-height:2.2;}
.deposit-row{background:var(--yellow-pale);border:1.5px solid #F5D68A;border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.deposit-input{border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:var(--yellow);text-align:left;width:100px;outline:none;}
.modal-actions{display:flex;gap:8px;padding:14px 20px;border-top:1.5px solid var(--border);flex-wrap:wrap;background:var(--surface2);border-radius:0 0 20px 20px;}
.mabtn{flex:1;min-width:100px;padding:10px;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.mabtn-confirm{background:var(--green);color:#fff;}
.mabtn-done{background:var(--blue);color:#fff;}
.mabtn-cancel{background:var(--red);color:#fff;}
.mabtn-print{background:var(--brand);color:#fff;}
.mabtn-kitchen{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}

/* PRINT */
@media print{
  body > *{display:none !important;}
  #printArea{display:block !important;position:fixed;inset:0;background:#fff;z-index:9999;}
}
#printArea{display:none;}

/* LOADING / EMPTY */
.loading{text-align:center;padding:40px;color:var(--text3);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .topbar-nav .nav-btn span{display:none;}
}
</style>
</head>

<div id="printArea"></div>

<script>
const PASSWORD = 'delpasta2024';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxgAMKWCG1mEdOEQYYH8cRkudxxQHKH8YcU4k2adrq7h8B3pOY8z7_xB-Vy8uOWQgTY/exec';
const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let allOrders = [];
let currentFilter = 'all';
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();

// --- AUTH ---
function doLogin(){
  if(document.getElementById('passInput').value === PASSWORD){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('mainWrap').style.display='block';
    loadOrders(); renderCalendar();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('passInput').value='';
  }
}
function logout(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('mainWrap').style.display='none';
}

// --- NAV ---
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='calendar') renderCalendar();
}

// --- LOAD ---
async function loadOrders(){
  document.getElementById('orders-wrap').innerHTML='<div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>';
  try{
    const res = await fetch(SHEET_URL+'?action=getOrders&t='+Date.now());
    const data = await res.json();
    allOrders = (data.orders||[]).filter(o=>o.orderNum&&o.name&&o.phone);
  } catch(e){
    allOrders=[];
    document.getElementById('orders-wrap').innerHTML='<div class="empty-state">⚠️ تعذر الاتصال — أعد المحاولة</div>';
    return;
  }
  renderOrders(); updateStats(); renderCalendar();
}

function updateStats(){
  document.getElementById('st-total').textContent=allOrders.length;
  document.getElementById('st-new').textContent=allOrders.filter(o=>o.status==='جديد').length;
  document.getElementById('st-confirmed').textContent=allOrders.filter(o=>o.status==='مؤكد').length;
  document.getElementById('st-done').textContent=allOrders.filter(o=>o.status==='منجز').length;
}

function renderOrders(){
  const list = currentFilter==='all'?allOrders:allOrders.filter(o=>o.status===currentFilter);
  if(!list.length){document.getElementById('orders-wrap').innerHTML='<div class="empty-state">لا توجد طلبات</div>';return;}
  const badgeMap={
    'جديد':'<span class="badge badge-new">⏳ معلق</span>',
    'مؤكد':'<span class="badge badge-confirmed">✅ مؤكد</span>',
    'منجز':'<span class="badge badge-done">🎉 منجز</span>',
    'ملغي':'<span class="badge badge-cancelled">❌ ملغي</span>'
  };
  let html=`<table><thead><tr>
    <th>رقم الطلب</th><th>الاسم</th><th>الجوال</th><th>الوجبة</th>
    <th>تاريخ المناسبة</th><th>الولاية</th><th>الضيوف</th><th>السعر</th><th>التوصيل</th><th>العربون</th><th>الحالة</th><th>إجراءات</th>
  </tr></thead><tbody>`;
  list.forEach(o=>{
    const idx=allOrders.indexOf(o);
    html+=`<tr>
      <td style="color:var(--brand);font-weight:700;font-size:11px;">${o.orderNum}</td>
      <td style="font-weight:700;color:var(--text);">${o.name}</td>
      <td>${o.phone}</td><td>${o.meal}</td>
      <td style="white-space:nowrap;">${o.dayName||''} ${o.eventDate}</td>
      <td>${o.gov}</td><td>${o.guests} شخص</td>
      <td style="color:var(--brand);font-weight:800;">${o.price} ر.ع</td>
      <td style="color:#2D8B5F;font-weight:700;">${o.delivery||'—'}</td>
      <td style="color:var(--yellow);font-weight:700;">${o.deposit||'—'}</td>
      <td>${badgeMap[o.status]||o.status}</td>
      <td><div class="action-btns">
        <button class="abtn abtn-view" onclick="viewOrder(${idx})">عرض</button>
        ${o.status!=='مؤكد'&&o.status!=='منجز'?`<button class="abtn abtn-confirm" onclick="updateStatus(${idx},'مؤكد')">تأكيد</button>`:''}
        ${o.status==='مؤكد'?`<button class="abtn abtn-done" onclick="updateStatus(${idx},'منجز')">منجز</button>`:''}
        ${o.status!=='ملغي'&&o.status!=='منجز'?`<button class="abtn abtn-cancel" onclick="updateStatus(${idx},'ملغي')">إلغاء</button>`:''}
        <button class="abtn abtn-print" onclick="printInvoice(${idx})">🖨️</button>
        <button class="abtn" style="background:#EAF4FB;color:#2471A3;" onclick="sendInvoicePDF(${idx})">📄</button>
      </div></td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('orders-wrap').innerHTML=html;
}

function filterOrders(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// --- VIEW ORDER ---
function viewOrder(idx){
  const o=allOrders[idx];
  const items=(o.items||'').replace(/\n/g,'<br>');
  const badgeMap={
    'جديد':'<span class="badge badge-new">⏳ معلق</span>',
    'مؤكد':'<span class="badge badge-confirmed">✅ مؤكد</span>',
    'منجز':'<span class="badge badge-done">🎉 منجز</span>',

function savePriceAdj(idx){
  const val=document.getElementById('priceadj-input').value.trim();
  if(!val) return;
  allOrders[idx].priceAdj=val;
  // تحديث الإجمالي في المودال فوراً
  const totalEl=document.getElementById('modal-total');
  if(totalEl) totalEl.textContent=(parseFloat(val||allOrders[idx].price||0)+parseFloat(allOrders[idx].delivery||0)).toFixed(3)+' ر.ع';
  renderOrders();
  try{ fetch(SHEET_URL+'?action=updatePrice',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNum:allOrders[idx].orderNum,price:val})}); }catch(e){}
  const btn=document.getElementById('priceadj-btn');
  if(btn){btn.textContent='✓ تم';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='حفظ';btn.style.background='#6A1B9A';},2000);}
}

function saveExtras(idx){
  const val=document.getElementById('extras-input').value.trim();
  allOrders[idx].extras=val;
  try{ fetch(SHEET_URL+'?action=updateExtras',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNum:allOrders[idx].orderNum,extras:val})}); }catch(e){}
  const btn=document.getElementById('extras-btn');
  if(btn){btn.textContent='✓ تم';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='حفظ';btn.style.background='#E65100';},2000);}
}

function clearPriceAdj(idx){
  allOrders[idx].priceAdj='';
  document.getElementById('priceadj-input').value='';
  const totalEl=document.getElementById('modal-total');
  if(totalEl) totalEl.textContent=(parseFloat(allOrders[idx].price||0)+parseFloat(allOrders[idx].delivery||0)).toFixed(3)+' ر.ع';
  renderOrders();
  try{ fetch(SHEET_URL+'?action=updatePrice',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNum:allOrders[idx].orderNum,price:''})}); }catch(e){}
}

function clearExtras(idx){
  allOrders[idx].extras='';
  document.getElementById('extras-input').value='';
  try{ fetch(SHEET_URL+'?action=updateExtras',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNum:allOrders[idx].orderNum,extras:''})}); }catch(e){}
}

function saveDelivery(idx){
  const val=document.getElementById('delivery-input').value.trim();
  allOrders[idx].delivery=val;
  renderOrders(); updateStats();
  try{ fetch(SHEET_URL+'?action=updateDelivery',{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNum:allOrders[idx].orderNum,delivery:val})}); }catch(e){}
}

function sendInvoiceWhatsApp(idx){
  const o=allOrders[idx];
  const total=(parseFloat(o.price||0)+parseFloat(o.delivery||0)).toFixed(3);
  const remaining=o.deposit?(parseFloat(total)-parseFloat(o.deposit)).toFixed(3)+' ر.ع':'—';
  let msg=`🌟 *فاتورة دل باستا*\n━━━━━━━━━━━━━━\n🔖 رقم الطلب: *#${o.orderNum}*\n\n`;
  msg+=`👤 ${o.name}\n📱 ${o.phone}\n🍽️ ${o.meal}\n📅 ${o.dayName||''} ${o.eventDate}\n📍 ${o.gov}\n👥 ${o.guests} شخص\n\n`;
  msg+=`━━━━━━━━━━━━━━\n💰 إجمالي الباقة: *${o.price} ر.ع*\n`;
  if(o.delivery) msg+=`🚚 التوصيل: *${parseFloat(o.delivery).toFixed(3)} ر.ع*\n`;
  msg+=`📊 الإجمالي: *${total} ر.ع*\n`;
  if(o.deposit) msg+=`✅ العربون: *${parseFloat(o.deposit).toFixed(3)} ر.ع*\n`;
  msg+=`💵 المتبقي: *${remaining}*\n━━━━━━━━━━━━━━\n_دل باستا | سجل تجاري: 1526997_`;
  sendInvoicePDF(idx);
  setTimeout(()=>{ window.open(`https://wa.me/${o.phone.replace(/\s+/g,'').replace(/^0/,'968')}?text=${encodeURIComponent(msg)}`,'_blank'); },800);
}

function saveDeposit(idx){
  const val=document.getElementById('deposit-input').value.trim();
  allOrders[idx].deposit=val;
  renderOrders();
  try{
    fetch(SHEET_URL+'?action=updateDeposit',{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({orderNum:allOrders[idx].orderNum,deposit:val})});
  }catch(e){}
  const btn=document.querySelector('.deposit-row button');
  if(btn){btn.textContent='✓';btn.style.background='var(--green)';}
}

function closeModal(){document.getElementById('orderModal').classList.remove('show');}

// --- STATUS ---
async function updateStatus(idx,status){
  allOrders[idx].status=status;
  renderOrders(); updateStats(); renderCalendar();
  try{
    const url=SHEET_URL+'?action=updateStatus&orderNum='+encodeURIComponent(allOrders[idx].orderNum)+'&status='+encodeURIComponent(status);
    await fetch(url,{mode:'no-cors'});
  }catch(e){}
}

function parseItems(str) {
  return (str||'').split('\n').map(l=>l.replace(/^[•\-]\s*/,'').trim()).filter(l=>l&&!['🍖','🥙','🥗','🍮','🥤'].some(e=>l.startsWith(e))&&!l.endsWith(':'));
}

function buildIngrTable(items) {
  let rows = '';
  items.forEach(item => {
    const ingrs = INGR[item.trim()];
    if(!ingrs) return;
    ingrs.forEach(ing => {
      rows += `<tr>
        <td style="padding:6px 10px;font-weight:600;border-bottom:1px solid #eee;">${item.trim()}</td>
        <td style="padding:6px 10px;color:#666;border-bottom:1px solid #eee;">${ing.n}</td>
        <td style="padding:6px 10px;text-align:center;color:#888;border-bottom:1px solid #eee;">${ing.u}</td>
        <td style="padding:6px 10px;border-bottom:1px solid #eee;"><div style="width:80px;border-bottom:1.5px solid #D4913A;">&nbsp;</div></td>
      </tr>`;
    });
  });
  return rows || '<tr><td colspan="4" style="padding:10px;color:#999;text-align:center;">—</td></tr>';
}

// --- CALENDAR ---
function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function normalizeDate(d){
  // handles 2026-04-30, 2026-04-30T00:00:00, 30/04/2026, etc.
  if(!d) return '';
  d = String(d).trim();
  // ISO with time: 2026-04-30T...
  if(d.includes('T')) d = d.split('T')[0];
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  // DD/MM/YYYY
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){
    const [dd,mm,yyyy]=d.split('/');
    return `${yyyy}-${mm}-${dd}`;
  }
  return d;
}

function renderCalendar(){
  document.getElementById('cal-label').textContent=MONTHS_AR[calMonth]+' '+calYear;
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('cal-names').innerHTML=days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const prevTotal=new Date(calYear,calMonth,0).getDate();
  const today=new Date();

  // Build events map with normalized dates
  const evMap={};
  allOrders.forEach(o=>{
    const nd = normalizeDate(o.eventDate);
    if(!nd) return;
    if(!evMap[nd]) evMap[nd]=[];
    evMap[nd].push(o);
  });

  let html='';
  for(let i=first-1;i>=0;i--)
    html+=`<div class="cal-day other-month"><div class="day-num">${prevTotal-i}</div></div>`;

  for(let d=1;d<=total;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const evs=evMap[ds]||[];
    const evHtml=evs.slice(0,3).map(e=>{
      const cls=e.status==='مؤكد'?'ev-confirmed':e.status==='منجز'?'ev-done':e.status==='ملغي'?'ev-cancelled':'ev-new';
      const label = e.name||e.orderNum||'طلب';
      return `<div class="day-event ${cls}">${label}</div>`;
    }).join('');
    const more = evs.length>3?`<div style="font-size:9px;color:var(--text3);">+${evs.length-3}</div>`:'';
    const hasBg = evs.length>0 ? 'border-right:3px solid '+(evs[0].status==='مؤكد'?'#27AE60':evs[0].status==='منجز'?'#2471A3':evs[0].status==='ملغي'?'#C0392B':'#D4850A')+';' : '';
    html+=`<div class="cal-day${isToday?' today':''}" style="${hasBg}" onclick="showDayOrders('${ds}')">
      <div class="day-num">${d}</div>${evHtml}${more}
    </div>`;
  }

  const rem=(first+total)%7;
  if(rem>0) for(let i=1;i<=7-rem;i++)
    html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;

  document.getElementById('cal-days').innerHTML=html;
}

function showDayOrders(ds){
  const evs=allOrders.filter(o=>normalizeDate(o.eventDate)===ds);
  if(!evs.length) return;
  viewOrder(allOrders.indexOf(evs[0]));
}

function openEditModal(idx){
  editIdx = idx;
  const o = allOrders[idx];
  const isBreakfast = o.meal === 'ريوق';

  // استخراج الأصناف الحالية
  editSel = {main:[],app:[],sal:[],des:[],drk:[]};
  brkfEditQty = {};

  if(isBreakfast){
    // استخراج كميات الإفطار من النص
    const lines = (o.items||'').split('\n').map(l=>l.replace(/^[•\s]+/,'').trim()).filter(Boolean);
    lines.forEach(line=>{
      // الكمية قد تكون "×2" أو "(20 علبة) ×2" أو "×2 (unit)"
      const qtyMatch = line.match(/[×x]\s*(\d+)/);
      const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
      Object.keys(BRKF_MENUS).forEach(cat=>{
        BRKF_MENUS[cat].items.forEach((item,i)=>{
          if(line.includes(item.name)){
            brkfEditQty[cat+'_'+i] = qty;
          }
        });
      });
    });
  } else {
    const lines = (o.items||'').split('\n').map(l=>l.replace(/^[•\s]+/,'').trim()).filter(Boolean);
    lines.forEach(item=>{
      Object.keys(EDIT_MENUS).forEach(grp=>{
        const i = EDIT_MENUS[grp].items.indexOf(item);
        if(i>=0 && !editSel[grp].includes(i)) editSel[grp].push(i);
      });
    });
  }

  renderEditModal();
  document.getElementById('editModal').classList.add('show');
}

          return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid ${qty>0?'var(--brand)':'var(--border)'};border-radius:8px;background:${qty>0?'var(--brand-pale)':'#fff'};">
            <div style="flex:1;font-size:12px;">${item.name}${item.unit?' — '+item.unit:''} <span style="color:var(--brand);font-weight:700;">${item.price.toFixed(3)} ر.ع</span></div>
            <div style="display:flex;align-items:center;gap:8px;">
              <button onclick="changeBrkfEdit('${cat}',${i},-1)" style="width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brand);background:#fff;color:var(--brand);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;">−</button>
              <span id="brkf-edit-qty-${cat}_${i}" style="font-size:15px;font-weight:800;min-width:20px;text-align:center;">${qty}</span>
              <button onclick="changeBrkfEdit('${cat}',${i},1)" style="width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brand);background:var(--brand);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  html += `<div style="margin-top:8px;">
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">📝 ملاحظات</div>
    <textarea id="edit-notes" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:Cairo,sans-serif;font-size:12px;resize:vertical;min-height:60px;outline:none;">${o.extras||''}</textarea>
  </div>`;

  document.getElementById('edit-modal-body').innerHTML = html;
}

function changeBrkfEdit(cat, i, delta){
  const key = cat+'_'+i;
  brkfEditQty[key] = Math.max(0,(brkfEditQty[key]||0)+delta);
  const el = document.getElementById('brkf-edit-qty-'+key);
  if(el) el.textContent = brkfEditQty[key];
  // تحديث السعر
  let total = 0;
  Object.keys(BRKF_MENUS).forEach(c=>{
    BRKF_MENUS[c].items.forEach((item,j)=>{
      total += (brkfEditQty[c+'_'+j]||0)*item.price;
    });
  });
  const priceEl = document.getElementById('edit-price');
  if(priceEl) priceEl.value = total.toFixed(3);
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('show');
  editIdx=-1;
}

function saveEditedOrder(){
  if(editIdx<0) return;
  const o = allOrders[editIdx];

  const name = document.getElementById('edit-name').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const date = document.getElementById('edit-date').value;
  const govSel = document.getElementById('edit-gov').value;
  const govOther = (document.getElementById('edit-gov-other')||{}).value||'';
  const gov = govSel==='أخرى'?(govOther||'أخرى'):govSel;
  const guestsSel = document.getElementById('edit-guests').value;
  const guestsCustom = (document.getElementById('edit-guests-custom')||{}).value||'';
  let guests = guestsSel==='custom'?(guestsCustom||guestsSel):guestsSel;
  const price = document.getElementById('edit-price').value.trim();
  const notes = document.getElementById('edit-notes').value.trim();
  const dayName = date ? DAYS_ARR[new Date(date+'T12:00:00').getDay()] : o.dayName;
  const isBreakfast = o.meal === 'ريوق';

  // بناء نص الأصناف
  let itemsText = '';
  if(isBreakfast){
    // أصناف الإفطار
    Object.keys(BRKF_MENUS).forEach(cat=>{
      const catItems = [];
      BRKF_MENUS[cat].items.forEach((item,i)=>{
        const qty = brkfEditQty[cat+'_'+i]||0;
        if(qty>0) catItems.push(`• ${item.name} ×${qty}`);
      });
      if(catItems.length) itemsText += BRKF_MENUS[cat].label+':\n'+catItems.join('\n')+'\n\n';
    });
    // عدد المعازيم من حقل الإفطار
    const brkfGuests = document.getElementById('edit-brkf-guests');
    if(brkfGuests && brkfGuests.value) guests = brkfGuests.value;
  } else {
    if(editSel.main.length) itemsText += '🍖 الرئيسية:\n'+editSel.main.map(i=>'• '+EDIT_MENUS.main.items[i]).join('\n')+'\n\n';
    if(editSel.app.length) itemsText += '🥙 الخفايف:\n'+editSel.app.map(i=>'• '+EDIT_MENUS.app.items[i]).join('\n')+'\n\n';
    if(editSel.sal.length) itemsText += '🥗 السلطات:\n'+editSel.sal.map(i=>'• '+EDIT_MENUS.sal.items[i]).join('\n')+'\n\n';
    if(editSel.des.length) itemsText += '🍮 الحلويات:\n'+editSel.des.map(i=>'• '+EDIT_MENUS.des.items[i]).join('\n')+'\n\n';
    if(editSel.drk.length) itemsText += '🥤 المشروبات:\n'+editSel.drk.map(i=>'• '+EDIT_MENUS.drk.items[i]).join('\n');
  }
  itemsText = itemsText.trim();

  // تحديث محلي
  o.name=name; o.phone=phone; o.eventDate=date; o.dayName=dayName;
  o.gov=gov; o.guests=guests; o.priceAdj=price; o.extras=notes;
  if(itemsText) o.items=itemsText;

  // حفظ في الشيت - POST مثل باقي الدوال
  const saveData = {
    orderNum: o.orderNum,
    name, phone, eventDate: date, dayName, gov, guests, price,
    items: itemsText||o.items,
    extras: notes
  };

  const saveBtn = document.querySelector('#edit-modal-actions button');
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='⏳ جارٍ الحفظ...'; }

  fetch(SHEET_URL+'?action=updateOrder', {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(saveData)
  }).then(function(){
    renderOrders(); updateStats();
    closeEditModal();
    showToast('✅ تم حفظ التعديلات بنجاح', 'success');
  }).catch(function(){
    if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent='💾 حفظ التعديلات'; }
    showToast('⚠️ حدث خطأ في الاتصال، حاول مرة أخرى', 'error');
  });
}

function closeKitchenOverlay(){
  document.getElementById('kitchenOverlay').style.display='none';
  document.body.style.overflow='';
  window._kitchenPrintHTML='';
}

function printKitchenSheet(){
  var html = window._kitchenPrintHTML||'';
  var win = window.open('','_blank','width=900,height=700');
  if(!win){
    alert('يرجى السماح بالنوافذ المنبثقة لهذا الموقع ثم حاول مجدداً');
    return;
  }
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;background:#fff;padding:14px;font-size:11px;}</style>'
    +'</head><body>'+html+'</body></html>');
  win.document.close();
  win.onload = function(){
    win.focus();
    win.print();
    setTimeout(function(){ if(!win.closed) win.close(); }, 2000);
  };
  setTimeout(function(){
    if(!win.closed){ win.focus(); win.print(); }
  }, 1500);
}

function showKitchenOverlay(html){
  window._kitchenPrintHTML = html;
  document.getElementById('kitchenContent').innerHTML = html;
  document.getElementById('kitchenOverlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function showToast(msg, type){
  var el = document.getElementById('toast-msg');
  if(!el) return;
  el.textContent = msg;
  el.style.background = type==='error' ? '#C0392B' : '#2D8B5F';
  el.style.display = 'block';
  el.style.opacity = '1';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){
    el.style.opacity = '0';
    setTimeout(function(){ el.style.display='none'; el.style.opacity='1'; }, 300);
  }, 3000);
}
</script>

<!-- KITCHEN OVERLAY -->

    <div style="background:linear-gradient(135deg,#9B6B2A,#D4913A);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1;">
      <div style="color:#fff;font-family:Cairo,sans-serif;font-weight:800;font-size:15px;">🍳 ورقة المطبخ</div>

        <button onclick="printKitchenSheet()" style="padding:7px 18px;background:#fff;border:none;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;color:#D4913A;cursor:pointer;">🖨️ طباعة</button>
        <button onclick="closeKitchenOverlay()" style="padding:7px 16px;background:rgba(255,255,255,.2);border:none;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;color:#fff;cursor:pointer;">✕ إغلاق</button>

  </div>
</div>
